apiVersion: v1
kind: Secret
metadata:
  name: {{PLUGIN_NAME}}-secrets
  namespace: nexus
  labels:
    app.kubernetes.io/name: {{PLUGIN_NAME}}
    app.kubernetes.io/component: plugin
type: Opaque
stringData:
  # Database connection string
  # DATABASE_URL: "postgresql://nexus:nexus@nexus-postgres.nexus.svc.cluster.local:5432/nexus"

  # Nexus API key for self-registration
  # NEXUS_API_KEY: "your-api-key-here"

  # Add your plugin-specific secrets here
  # EXTERNAL_API_KEY: "your-secret-key"
