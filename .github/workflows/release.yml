name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
      prerelease:
        description: 'Is this a pre-release?'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  # ==========================================================================
  # Determine Version
  # ==========================================================================
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Releasing version: $VERSION"

  # ==========================================================================
  # Build and Test
  # ==========================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: version
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install and build SDK
        working-directory: ./src
        run: |
          npm ci
          npm run build
          npm test

      - name: Update SDK version
        working-directory: ./src
        run: |
          npm version ${{ needs.version.outputs.version }} --no-git-tag-version

      - name: Pack SDK
        working-directory: ./src
        run: npm pack

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-package
          path: src/*.tgz

  # ==========================================================================
  # Build Template Archives
  # ==========================================================================
  templates:
    name: Package Templates
    runs-on: ubuntu-latest
    needs: version
    
    strategy:
      matrix:
        template:
          - basic
          - mcp-server
          - external-api
          - python
          - go
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create template archive
        run: |
          cd templates/${{ matrix.template }}
          tar -czvf ../../nexus-plugin-template-${{ matrix.template }}-${{ needs.version.outputs.version }}.tar.gz .

      - name: Upload template artifact
        uses: actions/upload-artifact@v4
        with:
          name: template-${{ matrix.template }}
          path: nexus-plugin-template-${{ matrix.template }}-*.tar.gz

  # ==========================================================================
  # Generate Changelog
  # ==========================================================================
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: version
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## What's Changed" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          
          if [ -n "$PREV_TAG" ]; then
            # Get commits since last tag
            git log --pretty=format:"* %s (%h)" "$PREV_TAG"..HEAD >> $GITHUB_OUTPUT
          else
            # First release - get all commits
            git log --pretty=format:"* %s (%h)" >> $GITHUB_OUTPUT
          fi
          
          echo "" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...${{ needs.version.outputs.tag }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ==========================================================================
  # Create GitHub Release
  # ==========================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, build, templates, changelog]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Nexus Plugin SDK ${{ needs.version.outputs.tag }}
          body: |
            # Nexus Plugin SDK ${{ needs.version.outputs.version }}
            
            Official SDK for building Nexus plugins with Plugin Intelligence Document (PID) support.
            
            ## Installation
            
            ```bash
            npm install @adverant-nexus/plugin-sdk@${{ needs.version.outputs.version }}
            ```
            
            ## Templates
            
            Download the template for your language:
            - **TypeScript (Basic)**: `nexus-plugin-template-basic-${{ needs.version.outputs.version }}.tar.gz`
            - **TypeScript (MCP Server)**: `nexus-plugin-template-mcp-server-${{ needs.version.outputs.version }}.tar.gz`
            - **TypeScript (External API)**: `nexus-plugin-template-external-api-${{ needs.version.outputs.version }}.tar.gz`
            - **Python**: `nexus-plugin-template-python-${{ needs.version.outputs.version }}.tar.gz`
            - **Go**: `nexus-plugin-template-go-${{ needs.version.outputs.version }}.tar.gz`
            
            ${{ needs.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: |
            artifacts/**/*.tgz
            artifacts/**/*.tar.gz

  # ==========================================================================
  # Publish to npm
  # ==========================================================================
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [version, release]
    if: github.event.inputs.prerelease != 'true'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install and build
        working-directory: ./src
        run: |
          npm ci
          npm run build

      - name: Update version
        working-directory: ./src
        run: npm version ${{ needs.version.outputs.version }} --no-git-tag-version

      - name: Publish to npm
        working-directory: ./src
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
