name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sundays at midnight
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # ==========================================================================
  # Dependency Vulnerability Scanning
  # ==========================================================================
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # TypeScript/Node.js dependencies
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit SDK dependencies
        working-directory: ./src
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Audit Basic Template dependencies
        working-directory: ./templates/basic
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Audit MCP Server Template dependencies
        working-directory: ./templates/mcp-server
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Audit External API Template dependencies
        working-directory: ./templates/external-api
        run: npm audit --audit-level=high
        continue-on-error: true

      # Python dependencies
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Audit Python dependencies
        working-directory: ./templates/python
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true
        continue-on-error: true

      # Go dependencies
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Audit Go dependencies
        working-directory: ./templates/go
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true
        continue-on-error: true

  # ==========================================================================
  # CodeQL Analysis
  # ==========================================================================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript', 'python', 'go']
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ==========================================================================
  # Secret Scanning
  # ==========================================================================
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install truffleHog
        run: pip install truffleHog3

      - name: Scan for secrets
        run: |
          trufflehog filesystem . \
            --only-verified \
            --fail \
            --exclude-paths=.github/ \
            --exclude-paths=node_modules/ \
            --exclude-paths=.git/ || true

  # ==========================================================================
  # Container Security Scanning
  # ==========================================================================
  container-scan:
    name: Container Scan
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        template:
          - basic
          - mcp-server
          - external-api
          - python
          - go
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t nexus-plugin-${{ matrix.template }}:scan \
            ./templates/${{ matrix.template }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nexus-plugin-${{ matrix.template }}:scan'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.template }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results-${{ matrix.template }}.sarif'
        if: always()

  # ==========================================================================
  # SAST with Semgrep
  # ==========================================================================
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >
            p/default
            p/security-audit
            p/secrets
            p/typescript
            p/python
            p/golang
        env:
          SEMGREP_RULES: "p/default p/security-audit"

  # ==========================================================================
  # License Compliance
  # ==========================================================================
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check TypeScript licenses
        working-directory: ./src
        run: |
          npm ci
          npx license-checker --summary --production
          # Fail on copyleft licenses in production deps
          npx license-checker --production --failOn "GPL;LGPL;AGPL" || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python licenses
        working-directory: ./templates/python
        run: |
          pip install pip-licenses
          pip install -r requirements.txt
          pip-licenses --format=markdown || true

  # ==========================================================================
  # Security Report Summary
  # ==========================================================================
  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, codeql, secret-scan, container-scan, semgrep, license-check]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.dependency-scan.result == 'success' && '✅ Passed' || '⚠️ Issues Found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL Analysis | ${{ needs.codeql.result == 'success' && '✅ Passed' || '⚠️ Issues Found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scanning | ${{ needs.secret-scan.result == 'success' && '✅ Passed' || '⚠️ Issues Found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Scan | ${{ needs.container-scan.result == 'success' && '✅ Passed' || '⚠️ Issues Found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Semgrep SAST | ${{ needs.semgrep.result == 'success' && '✅ Passed' || '⚠️ Issues Found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Check | ${{ needs.license-check.result == 'success' && '✅ Passed' || '⚠️ Issues Found' }} |" >> $GITHUB_STEP_SUMMARY
