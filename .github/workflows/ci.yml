name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ==========================================================================
  # TypeScript SDK and Templates
  # ==========================================================================
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # SDK
      - name: Install SDK dependencies
        working-directory: ./packages/nexus-plugin-sdk
        run: npm install

      - name: Lint SDK
        working-directory: ./packages/nexus-plugin-sdk
        run: npm run lint
        continue-on-error: true

      - name: Type check SDK
        working-directory: ./packages/nexus-plugin-sdk
        run: npm run typecheck

      - name: Test SDK
        working-directory: ./packages/nexus-plugin-sdk
        run: npm test
        continue-on-error: true

      - name: Build SDK
        working-directory: ./packages/nexus-plugin-sdk
        run: npm run build

      # Test Basic Template
      - name: Install Basic Template dependencies
        working-directory: ./templates/basic
        run: npm install

      - name: Type check Basic Template
        working-directory: ./templates/basic
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build Basic Template
        working-directory: ./templates/basic
        run: npm run build
        continue-on-error: true

      # Test MCP Server Template
      - name: Install MCP Server Template dependencies
        working-directory: ./templates/mcp-server
        run: npm install

      - name: Type check MCP Server Template
        working-directory: ./templates/mcp-server
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build MCP Server Template
        working-directory: ./templates/mcp-server
        run: npm run build
        continue-on-error: true

      # Test External API Template
      - name: Install External API Template dependencies
        working-directory: ./templates/external-api
        run: npm install

      - name: Type check External API Template
        working-directory: ./templates/external-api
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build External API Template
        working-directory: ./templates/external-api
        run: npm run build
        continue-on-error: true

  # ==========================================================================
  # Python Template
  # ==========================================================================
  python:
    name: Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./templates/python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        working-directory: ./templates/python
        run: |
          pip install ruff
          ruff check .
        continue-on-error: true

      - name: Type check with mypy
        working-directory: ./templates/python
        run: |
          pip install mypy
          mypy src/
        continue-on-error: true

      - name: Test with pytest
        working-directory: ./templates/python
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v
        continue-on-error: true

  # ==========================================================================
  # Go Template
  # ==========================================================================
  go:
    name: Go
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Download dependencies
        working-directory: ./templates/go
        run: go mod download

      - name: Tidy modules
        working-directory: ./templates/go
        run: go mod tidy

      - name: Lint with golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: ./templates/go
          version: latest
        continue-on-error: true

      - name: Build
        working-directory: ./templates/go
        run: go build -v ./...

      - name: Test
        working-directory: ./templates/go
        run: go test -v ./...
        continue-on-error: true

  # ==========================================================================
  # Docker Build Verification (only for templates with Dockerfiles)
  # ==========================================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [typescript, python, go]
    if: success() || failure()

    strategy:
      fail-fast: false
      matrix:
        template:
          - { path: 'templates/go', name: 'go' }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.template.path }}
          push: false
          tags: nexus-plugin-${{ matrix.template.name }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true
